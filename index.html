<html>
  <head>
    <title>
      QR Code generator
    </title>
  </head>
  <body>
    <input id="input" placeholder="Enter URL" />
    <button onclick="generate()">Generate</button>
    
    <div id="qr-wrap" style="
      display: inline-block;
      resize: both;
      overflow: hidden;
      min-width: 100px;
      min-height: 100px;
      width: 200px;
      height: 200px;
    ">
      <div id="qr"></div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script>
      const wrap = document.getElementById("qr-wrap");
    
      async function generate(text = document.getElementById("input").value) {
        if (!text) return;
        const size = wrap.offsetWidth;
        const svg = await QRCode.toString(text, { type: "svg", width: size });
        document.getElementById("qr").innerHTML = svg;
      }
    
      new ResizeObserver(() => {
        if (document.getElementById("qr").innerHTML) generate();
      }).observe(wrap);
    
      const param = new URLSearchParams(window.location.search).get("url");
      if (param) {
        document.getElementById("input").value = param;
        generate(param);
      }
    </script>
  <body>
</html>
