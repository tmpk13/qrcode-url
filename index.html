<html>
  <head>
    <title>
      QR Code generator
    </title>
  </head>
  <body>
    <input id="input" placeholder="Enter URL" />
    <button onclick="generate()">Generate</button>
    <div id="qr"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
      let qr = null;
      const param = new URLSearchParams(window.location.search).get("url");
    
      function generate(text = document.getElementById("input").value) {
        if (!text) return;
        const el = document.getElementById("qr");
        el.innerHTML = "";
        qr = new QRCode(el, { text, width: 200, height: 200 });
      }
    
      if (param) {
        document.getElementById("input").value = param;
        generate(param);
      }
    </script>
  <body>
</html>
