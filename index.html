<!DOCTYPE html>
<!-- Some code from Claude Sonnet 4.6 was used with modifications in this program -->
<html>
  <head>
    <title>
      QR Code generator
    </title>
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
  </head>
  <body>
    <input id="input" placeholder="Enter URL" />
    <button onclick="generate()">Generate</button>
    <button onclick="download()">Download SVG</button>
    
    <div id="qr-wrap" style="
      display: inline-block;
      resize: both;
      overflow: hidden;
      min-width: 100px;
      min-height: 100px;
      width: 200px;
      height: 200px;
    ">
      <div id="qr-svg"></div>
      <div id="qr-png"></div>
    </div>

    <button onclick="copySVG()">Copy SVG</button>
    
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script>
      const wrap = document.getElementById("qr-wrap");
    
      async function generate(text = document.getElementById("input").value) {
        if (!text) return;
        const size = wrap.offsetWidth;
        const svg = await QRCode.toString(text, { type: "svg", width: size });
        document.getElementById("qr-svg").innerHTML = svg;
        const png = await QRCode.toString(text, { type: "png", width: size });
        document.getElementById("qr-png").innerHTML = png;
      }
    
      new ResizeObserver(() => {
        if (document.getElementById("qr").innerHTML) generate();
      }).observe(wrap);
    
      const param = new URLSearchParams(window.location.search).get("text");
      if (param) {
        document.getElementById("input").value = param;
        generate(param);
      }

      function download() {
        const svg = document.getElementById("qr").innerHTML;
        if (!svg) return;
      
        const blob = new Blob([svg], { type: "image/svg+xml" });
        const a = Object.assign(document.createElement("a"), {
          href: URL.createObjectURL(blob),
          download: "qrcode.svg",
        });
        a.click();
        URL.revokeObjectURL(a.href);
      }

      async function copySVG(btn) {
        const svg = document.getElementById("qr").innerHTML;
        if (!svg) return;
        await navigator.clipboard.writeText(svg);
        btn.textContent = "Copied!";
        setTimeout(() => btn.textContent = "Copy SVG", 1500);
      }
    </script>
  <body>
</html>
